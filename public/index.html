<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="EventHub — Event Registration System" />
  <title>EventHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Decorative shapes -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <!-- Header -->
  <header id="app-header">
    <div class="header-inner">
      <div class="header-left">
        <div class="logo">
          <div class="logo-icon">🎈</div>
          <h1>Event<span class="accent">Hub</span></h1>
        </div>
        <p class="tagline">Seamless event management</p>
      </div>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <div class="theme-toggle-knob">☀️</div>
      </button>
    </div>
  </header>

  <main id="app-main">
    <!-- Stats -->
    <section class="stats-bar">
      <div class="stat-card">
        <div class="stat-emoji">📅</div>
        <span class="stat-value" id="stat-total-events">0</span>
        <span class="stat-label">Total Events</span>
      </div>
      <div class="stat-card">
        <div class="stat-emoji">🚀</div>
        <span class="stat-value" id="stat-upcoming">0</span>
        <span class="stat-label">Upcoming</span>
      </div>
      <div class="stat-card">
        <div class="stat-emoji">👥</div>
        <span class="stat-value" id="stat-registrations">0</span>
        <span class="stat-label">Registrations</span>
      </div>
      <div class="stat-card">
        <div class="stat-emoji">🎟️</div>
        <span class="stat-value" id="stat-available">0</span>
        <span class="stat-label">Available Seats</span>
      </div>
    </section>

    <!-- Toolbar -->
    <section class="toolbar">
      <h2>Events</h2>
      <div class="filter-group">
        <label class="toggle-label">
          <input type="checkbox" id="filter-upcoming" />
          <span class="toggle-dot"></span>
          <span class="toggle-text">Upcoming only</span>
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="sort-date" checked />
          <span class="toggle-dot"></span>
          <span class="toggle-text">Sort by date</span>
        </label>
        <button id="btn-create-event" class="btn btn-primary">
          <span class="btn-icon">➕</span> Create Event
        </button>
      </div>
    </section>

    <!-- Events Grid -->
    <section id="events-grid" class="events-grid">
      <!-- Injected by JS -->
    </section>

    <!-- Empty State -->
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">🌵</div>
      <h3>It's quiet here...</h3>
      <p>No events found. Be the first to create one!</p>
    </div>
  </main>

  <!-- Modals -->
  <div id="modal-create" class="modal-overlay hidden">
    <div class="modal">
      <button class="modal-close" id="close-create">&times;</button>
      <h2>Create New Event</h2>
      <form id="form-create-event">
        <div class="form-group">
          <label for="event-name">Event Name</label>
          <input type="text" id="event-name" placeholder="e.g. Summer Festival 2026" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="event-seats">Total Seats</label>
            <input type="number" id="event-seats" min="1" placeholder="100" required />
          </div>
          <div class="form-group">
            <label for="event-date">Event Date</label>
            <input type="datetime-local" id="event-date" required />
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Create Event</button>
      </form>
    </div>
  </div>

  <div id="modal-details" class="modal-overlay hidden">
    <div class="modal modal-lg">
      <button class="modal-close" id="close-details">&times;</button>
      <div id="event-details-content">
        <!-- Injected by JS -->
      </div>
    </div>
  </div>

  <div id="modal-confirm-delete" class="modal-overlay hidden">
    <div class="modal">
      <button class="modal-close" id="close-confirm-delete">&times;</button>
      <h2>Delete Event</h2>
      <p>Are you sure you want to delete this event? This action cannot be undone.</p>
      <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
        <button id="btn-cancel-delete" class="btn btn-outline btn-full">Cancel</button>
        <button id="btn-confirm-delete" class="btn btn-danger btn-full">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toasts -->
  <div id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
